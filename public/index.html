<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reality Defender</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #ff3c5a;
      --warn: #f0c040;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --card: #13131c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }
    .scanline {
      position: fixed; top: -2px; left: 0; width: 100%; height: 2px;
      background: linear-gradient(transparent, var(--accent), transparent);
      opacity: 0.12; animation: scan 8s linear infinite; pointer-events: none; z-index: 998;
    }
    @keyframes scan { from { top: -2px; } to { top: 100vh; } }

    header {
      padding: 1.75rem 3rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1.5rem;
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.2rem; }
    .logo span { color: var(--accent2); }
    h1 { font-size: 1rem; font-weight: 800; letter-spacing: -0.01em; }
    .status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 2s ease infinite; }
    .dot.err { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    main { max-width: 980px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; gap: 1.25rem; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem;
      animation: up 0.35s ease both;
    }
    @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .card:nth-child(2){animation-delay:.04s} .card:nth-child(3){animation-delay:.08s}
    .card:nth-child(4){animation-delay:.12s} .card:nth-child(5){animation-delay:.16s}

    .label {
      font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.22em; margin-bottom: 0.9rem;
    }

    .row { display: flex; gap: 0.65rem; align-items: center; }

    input[type=text], input[type=password], input[type=number] {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      padding: 0.7rem 1rem; color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 0.78rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,255,136,.07); }

    .ghost-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 0.7rem 0.9rem; border-radius: 3px; cursor: pointer;
      font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em;
      transition: all .15s;
    }
    .ghost-btn:hover { border-color: var(--accent); color: var(--accent); }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: 4px;
      padding: 2.75rem 2rem; text-align: center;
      cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: rgba(0,255,136,.025); }
    .drop-zone.filled { border-style: solid; border-color: var(--accent); }
    .drop-zone input[type=file] { position:absolute;inset:0;opacity:0;cursor:pointer; }
    .drop-icon { font-size: 2.2rem; opacity: .45; display: block; margin-bottom: 0.75rem; }
    .drop-main { font-size: .85rem; color: var(--muted); margin-bottom: .2rem; }
    .drop-sub { font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--muted); opacity: .55; }
    .drop-fname { font-family: 'Space Mono', monospace; font-size: .72rem; color: var(--accent); margin-top: .6rem; }

    .mode-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem; }
    .mode-btn {
      background: var(--bg); border: 1px solid var(--border); color: var(--muted);
      padding: .6rem; border-radius: 3px; cursor: pointer;
      font-family: 'Space Mono', monospace; font-size: .62rem;
      letter-spacing: .05em; text-transform: uppercase; text-align: center; transition: all .15s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--text); }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,.06); }

    .opts { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; margin-top: .85rem; }
    .opt label { display:block; font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.35rem; }
    .opt input { width:100%; }

    .run-btn {
      width:100%; padding: 1rem; background: var(--accent); color: #000;
      border: none; border-radius: 3px;
      font-family: 'Syne', sans-serif; font-size: .9rem; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
      transition: all .2s; position: relative; overflow: hidden;
    }
    .run-btn:hover:not(:disabled) { background: #00e87a; transform: translateY(-1px); }
    .run-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .run-btn .bar { position:absolute;left:0;top:0;bottom:0;background:rgba(0,0,0,.15);width:0%;transition:width .4s ease; }

    /* Results */
    #results { display:none; }
    #results.on { display:block; }

    .verdict-row { display:flex; align-items:center; gap:1rem; margin-bottom:1.4rem; }
    .verdict { font-size: 1.85rem; font-weight: 800; letter-spacing: -.03em; }
    .verdict.MANIPULATED { color: var(--accent2); }
    .verdict.AUTHENTIC   { color: var(--accent); }
    .verdict.UNCERTAIN, .verdict.INCONCLUSIVE { color: var(--warn); }
    .verdict.PROCESSING  { color: var(--muted); }

    .badge {
      font-family: 'Space Mono', monospace; font-size: .62rem;
      padding: .28rem .65rem; border-radius: 2px; text-transform: uppercase; letter-spacing: .1em;
    }
    .badge.MANIPULATED { background:rgba(255,60,90,.12);color:var(--accent2);border:1px solid var(--accent2); }
    .badge.AUTHENTIC   { background:rgba(0,255,136,.08);color:var(--accent);border:1px solid var(--accent); }
    .badge.UNCERTAIN, .badge.INCONCLUSIVE { background:rgba(240,192,64,.1);color:var(--warn);border:1px solid var(--warn); }
    .badge.PROCESSING  { background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border); }

    .score-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.45rem; }
    .score-key { font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .score-num { font-family:'Space Mono',monospace; font-size:1.05rem; font-weight:700; }
    .track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:1.25rem; }
    .fill { height:100%; border-radius:3px; width:0%; transition:width 1.1s cubic-bezier(.16,1,.3,1); }
    .fill.hi { background:linear-gradient(90deg,#ff3c5a,#ff7a90); }
    .fill.lo { background:linear-gradient(90deg,#00ff88,#00cc6e); }
    .fill.md { background:linear-gradient(90deg,#f0c040,#e09020); }

    .reqid { display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem; }
    .reqid-label { font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .reqid-val { font-family:'Space Mono',monospace; font-size:.68rem; background:var(--bg); border:1px solid var(--border); padding:.18rem .5rem; border-radius:2px; }

    .models-label { font-family:'Space Mono',monospace; font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.22em; margin: 1.25rem 0 .5rem; }
    .model-row {
      display:grid; grid-template-columns:1fr auto auto; gap:1rem; align-items:center;
      padding:.55rem 0; border-bottom:1px solid var(--border);
      animation: up .25s ease both;
    }
    .model-row:last-child { border-bottom:none; }
    .mname { font-family:'Space Mono',monospace; font-size:.72rem; }
    .mstatus { font-family:'Space Mono',monospace; font-size:.62rem; text-transform:uppercase; letter-spacing:.04em; }
    .mstatus.MANIPULATED{color:var(--accent2)} .mstatus.AUTHENTIC{color:var(--accent)}
    .mstatus.UNCERTAIN,.mstatus.INCONCLUSIVE{color:var(--warn)}
    .mscore { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); min-width:3.5rem; text-align:right; }

    /* Error */
    .err-box { display:none; background:rgba(255,60,90,.07); border:1px solid rgba(255,60,90,.25); border-radius:3px; padding:.85rem 1rem; font-family:'Space Mono',monospace; font-size:.72rem; color:var(--accent2); }
    .err-box.on { display:block; }

    /* Log */
    .log {
      background:var(--bg); border:1px solid var(--border); border-radius:3px;
      padding:.85rem 1rem; font-family:'Space Mono',monospace; font-size:.68rem;
      color:var(--muted); max-height:160px; overflow-y:auto; line-height:1.9;
    }
    .log p { margin:0; }
    .log .ok  { color: var(--accent); }
    .log .err { color: var(--accent2); }
    .log .inf { color: #6a9fcd; }

    @media(max-width:600px){
      header{padding:1.25rem}
      main{padding:1.25rem 1rem}
      .mode-grid{grid-template-columns:1fr}
      .opts{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="scanline"></div>

<header>
  <div>
    <div class="logo">Reality<span>Defender</span></div>
    <h1>Deepfake Detection Interface</h1>
  </div>
  <div class="status-pill">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">idle</span>
  </div>
</header>

<main>

  <!-- API Key -->
  <div class="card">
    <div class="label">01 — Authentication</div>
    <div class="row">
      <input type="password" id="apiKey" placeholder="Enter your Reality Defender API key…" />
      <button class="ghost-btn" onclick="toggleKey()">SHOW</button>
    </div>
  </div>

  <!-- File -->
  <div class="card">
    <div class="label">02 — Media Input</div>
    <div class="drop-zone" id="dz">
      <input type="file" id="fileInput" accept="image/*,video/*,audio/*" onchange="onFileChange(this)" />
      <span class="drop-icon">⬡</span>
      <p class="drop-main">Drop file here or click to browse</p>
      <p class="drop-sub">JPG · PNG · MP4 · MOV · MP3 · WAV · WEBM</p>
      <p class="drop-fname" id="fname"></p>
    </div>
  </div>

  <!-- Mode -->
  <div class="card">
    <div class="label">03 — Detection Mode</div>
    <div class="mode-grid">
      <button class="mode-btn active" id="m-detect" onclick="setMode('detect',this)">⚡ Auto Detect</button>
      <button class="mode-btn" id="m-twostep" onclick="setMode('twostep',this)">⇄ Two-Step</button>
      <button class="mode-btn" id="m-stream" onclick="setMode('stream',this)">◉ Event-Driven</button>
    </div>
    <div class="opts">
      <div class="opt">
        <label>Polling Interval (ms)</label>
        <input type="number" id="pollMs" value="5000" min="1000" />
      </div>
      <div class="opt" id="timeoutWrap">
        <label>Timeout (ms)</label>
        <input type="number" id="timeoutMs" value="120000" min="5000" />
      </div>
    </div>
  </div>

  <!-- Run -->
  <button class="run-btn" id="runBtn" onclick="run()" disabled>
    <div class="bar" id="progBar"></div>
    <span id="btnLabel">ANALYZE MEDIA</span>
  </button>

  <!-- Error -->
  <div class="err-box" id="errBox"></div>

  <!-- Results -->
  <div class="card" id="results">
    <div class="label">04 — Analysis Results</div>

    <div class="verdict-row">
      <div class="verdict" id="verdictTxt">—</div>
      <div class="badge" id="verdictBadge">—</div>
    </div>

    <div class="score-row">
      <span class="score-key">Confidence Score</span>
      <span class="score-num" id="scoreNum">—</span>
    </div>
    <div class="track"><div class="fill" id="fill"></div></div>

    <div class="reqid">
      <span class="reqid-label">Request ID</span>
      <span class="reqid-val" id="reqIdVal">—</span>
    </div>

    <div id="modelsWrap" style="display:none">
      <div class="models-label">Model Breakdown</div>
      <div id="modelRows"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="label">Console</div>
    <div class="log" id="logEl"><p>// Waiting for input…</p></div>
  </div>

</main>

<script>
  let mode = 'detect';
  let file = null;

  // ── helpers ────────────────────────────────────────────────────────────────
  function ts() {
    return new Date().toLocaleTimeString('en-US',{hour12:false});
  }
  function log(msg, cls='') {
    const el = document.getElementById('logEl');
    const p = document.createElement('p');
    p.className = cls;
    p.textContent = `[${ts()}] ${msg}`;
    el.appendChild(p);
    el.scrollTop = el.scrollHeight;
  }
  function setStatus(s) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('statusTxt');
    txt.textContent = s;
    dot.className = 'dot' + (s==='analyzing' ? ' live' : s==='error' ? ' err' : '');
  }
  function checkReady() {
    const key = document.getElementById('apiKey').value.trim();
    document.getElementById('runBtn').disabled = !(key && file);
  }
  function showErr(msg) {
    const b = document.getElementById('errBox');
    b.textContent = '⚠  ' + msg;
    b.classList.add('on');
  }
  function clearErr() {
    document.getElementById('errBox').classList.remove('on');
  }

  let progInt;
  function startProg() {
    const bar = document.getElementById('progBar');
    const btn = document.getElementById('runBtn');
    document.getElementById('btnLabel').textContent = 'ANALYZING…';
    btn.disabled = true;
    let w = 0;
    progInt = setInterval(() => { w = Math.min(w + Math.random()*6, 82); bar.style.width = w+'%'; }, 400);
  }
  function stopProg(success=true) {
    clearInterval(progInt);
    const bar = document.getElementById('progBar');
    bar.style.width = '100%';
    setTimeout(() => {
      bar.style.width = '0%';
      document.getElementById('runBtn').disabled = false;
      document.getElementById('btnLabel').textContent = 'ANALYZE MEDIA';
    }, 500);
  }

  // ── file ───────────────────────────────────────────────────────────────────
  function onFileChange(inp) {
    file = inp.files[0];
    if (!file) return;
    document.getElementById('fname').textContent = `✓ ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
    document.getElementById('dz').classList.add('filled');
    log(`File: ${file.name}`, 'ok');
    checkReady();
  }

  const dz = document.getElementById('dz');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) {
      file = f;
      document.getElementById('fname').textContent = `✓ ${f.name} (${(f.size/1024).toFixed(1)} KB)`;
      dz.classList.add('filled');
      log(`File: ${f.name}`, 'ok');
      checkReady();
    }
  });

  document.getElementById('apiKey').addEventListener('input', checkReady);

  function toggleKey() {
    const inp = document.getElementById('apiKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    event.target.textContent = inp.type === 'password' ? 'SHOW' : 'HIDE';
  }

  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    log(`Mode: ${m}`, 'inf');
  }

  // ── results renderer ───────────────────────────────────────────────────────
  function renderResults(result, requestId) {
    const status = result.status || 'UNKNOWN';
    const scoreEl = document.getElementById('scoreNum');
    const fill = document.getElementById('fill');

    document.getElementById('verdictTxt').textContent = status;
    document.getElementById('verdictTxt').className = `verdict ${status}`;
    document.getElementById('verdictBadge').textContent = status;
    document.getElementById('verdictBadge').className = `badge ${status}`;

    const sc = result.score;
    if (sc !== null && sc !== undefined) {
      scoreEl.textContent = (sc * 100).toFixed(1) + '%';
      fill.style.width = (sc * 100) + '%';
      fill.className = 'fill ' + (sc > .66 ? 'hi' : sc > .33 ? 'md' : 'lo');
    } else {
      scoreEl.textContent = 'N/A';
    }

    if (requestId) document.getElementById('reqIdVal').textContent = requestId;

    if (result.models?.length) {
      const container = document.getElementById('modelRows');
      container.innerHTML = '';
      result.models.forEach((m, i) => {
        const row = document.createElement('div');
        row.className = 'model-row';
        row.style.animationDelay = `${i * 0.04}s`;
        row.innerHTML = `
          <span class="mname">${m.name}</span>
          <span class="mstatus ${m.status}">${m.status || '—'}</span>
          <span class="mscore">${m.score !== null ? (m.score * 100).toFixed(1) + '%' : '—'}</span>`;
        container.appendChild(row);
      });
      document.getElementById('modelsWrap').style.display = 'block';
    }

    document.getElementById('results').classList.add('on');
  }

  // ── build FormData ─────────────────────────────────────────────────────────
  function buildForm(extras = {}) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('apiKey', document.getElementById('apiKey').value.trim());
    fd.append('pollingInterval', document.getElementById('pollMs').value);
    fd.append('timeout', document.getElementById('timeoutMs').value);
    Object.entries(extras).forEach(([k,v]) => fd.append(k,v));
    return fd;
  }

  // ── run ────────────────────────────────────────────────────────────────────
  async function run() {
    clearErr();
    setStatus('analyzing');
    startProg();
    log(`Running in ${mode} mode…`, 'inf');

    try {
      if (mode === 'detect') await runDetect();
      else if (mode === 'twostep') await runTwoStep();
      else await runStream();
      setStatus('done');
    } catch (err) {
      log(`Error: ${err.message}`, 'err');
      showErr(err.message);
      setStatus('error');
      stopProg(false);
    }
  }

  // ── auto detect ────────────────────────────────────────────────────────────
  async function runDetect() {
    log('Uploading + waiting for result…', 'inf');
    const res = await fetch('/api/detect', { method: 'POST', body: buildForm() });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Detection failed');
    log(`Done — ${data.result.status} (${data.result.score !== null ? (data.result.score*100).toFixed(1)+'%' : 'N/A'})`, 'ok');
    renderResults(data.result, null);
    stopProg();
  }

  // ── two-step ───────────────────────────────────────────────────────────────
  async function runTwoStep() {
    log('Step 1: Uploading…', 'inf');
    const upRes = await fetch('/api/upload', { method: 'POST', body: buildForm() });
    const upData = await upRes.json();
    if (!upData.ok) throw new Error(upData.error || 'Upload failed');
    const { requestId } = upData;
    log(`Uploaded. Request ID: ${requestId}`, 'ok');

    log('Step 2: Fetching result…', 'inf');
    const apiKey = document.getElementById('apiKey').value.trim();
    const res2 = await fetch(`/api/result/${requestId}?apiKey=${encodeURIComponent(apiKey)}`);
    const data2 = await res2.json();
    if (!data2.ok) throw new Error(data2.error || 'Result fetch failed');
    log(`Done — ${data2.result.status}`, 'ok');
    renderResults(data2.result, requestId);
    stopProg();
  }

  // ── event-driven (SSE) ────────────────────────────────────────────────────
  async function runStream() {
    log('Uploading via SSE stream…', 'inf');
    const fd = buildForm();

    const res = await fetch('/api/stream', { method: 'POST', body: fd });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const chunk of parts) {
        const evMatch = chunk.match(/^event: (\w+)/m);
        const dataMatch = chunk.match(/^data: (.+)$/m);
        if (!evMatch || !dataMatch) continue;
        const ev = evMatch[1];
        const payload = JSON.parse(dataMatch[1]);
        if (ev === 'log')      log(payload.msg, 'inf');
        if (ev === 'uploaded') { log(`Request ID: ${payload.requestId}`, 'ok'); document.getElementById('reqIdVal').textContent = payload.requestId; }
        if (ev === 'error')    { throw new Error(payload.error); }
        if (ev === 'result')   {
          log(`Done — ${payload.result.status}`, 'ok');
          renderResults(payload.result, null);
          stopProg();
          return;
        }
      }
    }
    stopProg();
  }
</script>
</body>
</html>
